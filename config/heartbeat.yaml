version: "3.0"

# Session 89: renamed from dream_cycle to heartbeat.
# API-only architecture means no resource contention between chat and
# background work. Chat is always immediate; the heartbeat runs on a
# single interval.

# Heartbeat timing
# interval: seconds between background cycles when idle.
# Changeable at runtime via Discord: "set heartbeat to 15 minutes"
heartbeat:
  interval: 300                   # 5 minutes (lower for testing)

# Quiet hours: notifications suppressed during quiet hours (defined in
# archi_identity.yaml working_hours). Archi still processes in background,
# just doesn't message the user. No duplicate night-mode config here.

# Hardware protection thresholds live in rules.yaml (monitoring section).
