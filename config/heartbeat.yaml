version: "3.0"

# Session 89: renamed from dream_cycle to heartbeat.
# API-only architecture means no resource contention between chat and
# background work. Chat is always immediate; the heartbeat runs on a
# single interval.

# Heartbeat timing
# interval: base seconds between background cycles when idle.
# Changeable at runtime via Discord: "set heartbeat to 15 minutes"
#
# Adaptive scheduling (session 115): interval doubles after idle cycles
# (no work found) up to max_interval, and resets to base after productive
# cycles or user activity. min_interval is the floor for high-priority wake.
heartbeat:
  interval: 900                   # 15 minutes — restored from live-test override (session 161)
  min_interval: 300               # 5 minutes — restored from live-test override (session 161)
  max_interval: 7200              # 2 hours — max backoff when idle
  max_parallel_tasks: 3           # Max concurrent tasks in a wave (session 120)

# Quiet hours: notifications suppressed during quiet hours (defined in
# archi_identity.yaml working_hours). Archi still processes in background,
# just doesn't message the user. No duplicate night-mode config here.

# Hardware protection thresholds live in rules.yaml (monitoring section).
