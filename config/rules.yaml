version: "2.0"

# Archi Safety Configuration — Single Source of Truth
#
# This file defines all safety boundaries: budgets, protected files,
# blocked commands, action risk levels, and monitoring thresholds.
#
# Consumers (via src/utils/config.py):
#   - SafetyController  (risk_levels, non_override_rules)
#   - PlanExecutor      (protected_files, blocked_commands)
#   - CostTracker       (budget_hard_stop, budget_warning_pct)
#   - heartbeat          (monitoring thresholds)
#   - SystemMonitor, HealthCheck, SystemHealthLogger, SystemAlert
#   - ArchiService
#   - BrowserControl, ToolRegistry (browser timeouts)

# ── Absolute non-override rules ──────────────────────────────────────
non_override_rules:
  - name: "budget_hard_stop"
    description: "Stop all paid operations at budget limits"
    # API-first with Grok 4.1 Fast: ~$0.52-1.04/day typical usage.
    # $5/day gives ~5x headroom for heavy research days.
    daily_limit: 5.00
    monthly_limit: 100.00
    enabled: true

  - name: "no_unauthorized_contact"
    description: "Never initiate external communication without approval"
    enabled: true

  - name: "dream_cycle_budget"
    description: "Max cost per single dream cycle (prevents one hallucination burning the daily budget)"
    # Typical cycle: ~$0.05-0.15. Cap at $0.50 for safety.
    limit: 0.50
    enabled: true

# ── Protected files (self-preservation) ──────────────────────────────
# These files cannot be modified by any autonomous action.
# PlanExecutor checks this list before write_source and edit_file.
protected_files:
  - "src/core/plan_executor/__init__.py"
  - "src/core/plan_executor/executor.py"
  - "src/core/plan_executor/actions.py"
  - "src/core/plan_executor/safety.py"
  - "src/core/plan_executor/recovery.py"
  - "src/core/plan_executor/web.py"
  - "src/core/safety_controller.py"
  - "src/utils/config.py"
  - "src/utils/git_safety.py"
  - "config/prime_directive.txt"
  - "config/rules.yaml"
  - "config/archi_identity.yaml"
  - "config/personality.yaml"
  - "config/mcp_servers.yaml"
  # Claude session docs — protect entire directory
  - "claude/"
  # Core loop module — autonomous write_source could disable the event loop
  - "src/core/heartbeat.py"
  - "src/core/goal_manager.py"
  # Monitoring infrastructure — prevents Archi from mangling these
  # during autonomous "fix the sensor" loops
  - "src/monitoring/system_monitor.py"
  - "src/monitoring/health_check.py"
  - "src/monitoring/performance_monitor.py"

# ── Approval-required paths (source code gate) ───────────────────────
# Autonomous modifications to files under these prefixes require explicit
# user approval via Discord before execution.  If no approval channel is
# available (e.g. Discord offline), the modification is denied by default.
# Chat-mode requests from the user are auto-approved (they asked for it).
approval_required_paths:
  - "src/"

# ── Allowed shell commands (allowlist) ────────────────────────────────
# Only commands whose first token matches this list are permitted.
# Parsed via shlex.split() so quoting tricks can't bypass.  The
# blocklist below is a secondary defense-in-depth layer.
allowed_commands:
  - "pip"
  - "pip3"
  - "pytest"
  - "python"
  - "python3"
  - "git"
  - "node"
  - "npm"
  - "npx"
  - "tsc"
  - "ls"
  - "dir"
  # "echo" removed (session 71) — could leak env vars via `echo $API_KEY`.
  # Use run_python with print() if output is needed.
  - "cat"
  - "type"
  - "head"
  - "tail"
  - "cd"
  - "pwd"
  - "which"
  - "where"
  - "arma"   # Local image gen model alias
  - "lust"   # Local image gen model alias

# ── Blocked shell commands (defense-in-depth) ───────────────────────
# Substring match against run_command input AFTER the allowlist passes.
# Catches dangerous flag combinations even on allowed commands.
blocked_commands:
  - "rm -rf"
  - "rm -r /"
  - "rmdir /s"
  - "del /s"
  - "del /f"
  - "format "
  - "format.com"
  - "shutdown"
  - "reboot"
  - "restart-computer"
  - "stop-computer"
  - ":(){ "
  - "fork bomb"
  - "mkfs."
  - "dd if="
  - "reg delete"
  - "reg add"
  - "> /dev/sda"
  - "chmod -r 000"
  - "chmod 000 /"
  - ":(){ :|:& };:"

# ── Action risk levels ───────────────────────────────────────────────
# Maps every action type to a risk tier with confidence threshold
# and authorization requirement.
#
# requirement options:
#   autonomous          — execute without asking
#   human_approval      — prompt user before executing
#   manual_execute_only — queue for user to do manually
risk_levels:
  L1_LOW:
    threshold: 0.5
    actions:
      - "read_file"
      - "list_files"
      - "list_directory"
      - "check_system_status"
      - "web_search"
      - "fetch_webpage"
      - "think"
      # GitHub MCP server (read-only operations)
      - "list_issues"
      - "get_issue"
      - "search_issues"
      - "list_commits"
      - "get_file_contents"
      - "search_repositories"
      - "search_code"
      - "list_branches"
      - "get_pull_request"
      - "list_pull_requests"
    requirement: "autonomous"
    logging: "standard"

  L2_MEDIUM:
    threshold: 0.7
    actions:
      - "create_file"
      - "append_file"
      - "edit_file"
      # GitHub MCP server (write operations)
      - "create_issue"
      - "update_issue"
      - "add_issue_comment"
      - "create_pull_request"
      - "create_branch"
      - "push_files"
    requirement: "autonomous"
    logging: "detailed"
    backup_required: true

  L3_HIGH:
    threshold: 0.9
    actions:
      - "write_source"
      - "run_command"
      - "run_script"
      - "run_python"
    requirement: "autonomous"
    logging: "comprehensive"
    backup_required: true

  L4_CRITICAL:
    threshold: 1.0
    actions:
      - "delete_file"
      - "send_email"
      - "financial_transaction"
    requirement: "manual_execute_only"
    logging: "comprehensive"
    backup_required: true
    confirmation_required: 2

# ── Rate limiting ────────────────────────────────────────────────────
rate_limits:
  global_cooldown: 1.0
  api_calls_per_hour: 50
  file_operations_per_hour: 100

# ── Resource monitoring ──────────────────────────────────────────────
# Single source of truth for system health thresholds.
# Used by: SystemMonitor, HealthCheck, SystemHealthLogger, SystemAlert,
#          heartbeat.yaml (throttling).
monitoring:
  cpu_threshold: 80
  memory_threshold: 90
  temp_threshold: 80
  disk_threshold: 90
  budget_warning_pct: 80         # Warn when daily/monthly budget exceeds this %

# ── Worker pool ───────────────────────────────────────────────────
# Concurrent goal execution (session 34).  Each goal gets its own
# thread; max_workers controls how many goals run simultaneously.
# Used by: GoalWorkerPool.
worker_pool:
  max_workers: 2             # Hard cap: 4
  per_goal_budget: 1.00      # Max $ per goal before the worker pauses

# ── Task orchestrator ─────────────────────────────────────────────
# Wave-based parallel task execution within a single goal (session 35).
# Independent tasks (no mutual dependencies) run simultaneously in "waves".
# Note: Total concurrent threads = max_workers × max_parallel_tasks_per_goal
# Used by: TaskOrchestrator.
task_orchestrator:
  enabled: true
  max_parallel_tasks_per_goal: 2    # Hard cap: 4

# ── Proactive initiative ─────────────────────────────────────────
# Self-initiated work when Archi is idle (session 36).
# Budget is separate from normal goal costs.  Archi picks a small task
# he thinks the user would appreciate, does it, and reports back.
# Used by: Heartbeat._try_proactive_initiative(), InitiativeTracker.
initiative:
  enabled: true
  daily_budget: 0.50               # Max $ per day for self-initiated work
  respect_quiet_hours: true        # Don't initiate during sleeping hours
  max_per_day: 2                   # Max self-initiated goals per day

# ── File cleanup ──────────────────────────────────────────────────
# Used by: FileTracker, Heartbeat._run_file_cleanup().
file_cleanup:
  stale_days: 14                 # Files older than this are candidates for cleanup
  persistent_paths:              # Glob patterns for files that should never be purged
    - "workspace/projects/*/README.md"
    - "workspace/projects/*/config*"

# ── Browser automation ─────────────────────────────────────────────
# Used by: BrowserControl, ToolRegistry (_BrowserTool).
browser:
  default_timeout_ms: 5000       # Default wait/click/fill timeout
  navigation_timeout_ms: 30000   # Page navigation timeout
