[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore=tests/integration
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    slow: Slow tests (can be skipped with -m "not slow")
    live: Tests that call external APIs (OpenRouter) and cost real money
    env_specific: Tests requiring specific environment (pytest-asyncio, live data, etc.)
